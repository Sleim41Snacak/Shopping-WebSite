<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="SelimShop.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
  <script src="SelimShop.js"></script>
  <title>Selimin Sitesi</title>
</head>

<body>
  <header>
    <h2 class="logo">Selim Shop</h2>
    <div class="Kategoriler-ayırma"> 
      <button class="Kategoriler" id="Spor">Spor</button>
      <button class="Kategoriler" id="Teknoloji">Teknoloji</button>
      <button class="Kategoriler" id="Yiyecekİçecek">Yiyecek İçecek</button>
      <button class="Kategoriler" id="Tümü">Tümü</button>
    </div>
    <div id="sepet" class="sepet">Sepet: 0₺</div>
  </header>

  <div class="urunler">
    <div class="urun" data-kategori="Spor">
      <img src="İmages/forma.jpeg" alt="Forma" />
      <h3>Forma</h3>
      <p>Fiyat: 2250₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Spor">
      <img src="İmages/top.jpeg" alt="Top" />
      <h3>Top</h3>
      <p>Fiyat: 1200₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Spor">
      <img src="İmages/krampon.jpeg" alt="Krampon" />
      <h3>Krampon</h3>
      <p>Fiyat: 1800₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Teknoloji">
      <img src="İmages/telefon.jpeg" alt="Telefon" />
      <h3>Telefon</h3>
      <p>Fiyat: 120000₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Teknoloji">
      <img src="İmages/kulaklık.jpeg" alt="Kulaklık" />
      <h3>Kulaklık</h3>
      <p>Fiyat: 1500₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Teknoloji">
      <img src="İmages/Akıllı saat.jpeg" alt="Akıllı saat" />
      <h3>Akıllı Saat</h3>
      <p>Fiyat: 3500₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Yiyecekİçecek">
      <img src="İmages/su.jpeg" alt="su" />
      <h3>Doğal Kaynak Suyu</h3>
      <p>Fiyat: 10₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Yiyecekİçecek">
      <img src="İmages/Gofret.jpeg" alt="Gofret" />
      <h3>Ülker Çikolatalı Gofret</h3>
      <p>Fiyat: 5₺</p>
      <button>Sepete Ekle</button>
    </div>

    <div class="urun" data-kategori="Yiyecekİçecek">
      <img src="İmages/soda.png" alt="soda" />
      <h3>Beypazarı Doğal Maden Suyu</h3>
      <p>Fiyat: 15₺</p>
      <button>Sepete Ekle</button>
    </div>
  </div>
</body>
</html>
